{% extends 'layout.html' %}
{% load static %}

{% block title %}
    Analytics
{% endblock %}

{% block content %}
    <div class="center-content">
        <h1>Analytics Visualisation</h1>
        <button onclick="history.back()" class="choose">Return</button>

        
        <h2>Gender</h2>
        <p>Click image to download</p>
        <a href="{% static 'gender.png' %}" download="visual">
            <img src="{% static 'gender.png' %}" alt="Gender">
        </a>

        <h1>Follow-up Analytics</h1>

        <a href="/anal/1-5">
            <button class="choose" alt="donut">Category purchases by gender</button>
        </a>
        <a href="/anal/2-5">
            <button class="choose" alt="scattered/donut">Price analytics by gender</button>
        </a>
        <a href="/anal/3-5">
            <button class="choose" alt="donut">Purchase month by gender</button>
        </a>
    </div>
{% endblock %}
