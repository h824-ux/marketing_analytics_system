{% extends 'layout.html' %}
{% load static %}

{% block title %}
    Analytics
{% endblock %}

{% block content %}
    <div class="center-content">
        <h1>Analytics Visualisation</h1>
        <button onclick="history.back()" class="choose">Return</button>
        
        <h2>Product Category</h2>
        <p>Click image to download</p>
        <a href="{% static 'category.png' %}" download="visual">
            <img src="{% static 'category.png' %}" alt="Product Category">
        </a>

        <h1>Follow-up Analytics</h1>

        <a href="/anal/1-2">
            <button class="choose" alt="donut">Price analytics by category</button>
        </a>
        <a href="/anal/1-3">
            <button class="choose" alt="--">Category by month</button>
        </a>
        <a href="/anal/1-5">
            <button class="choose" alt="donut">Category purchases by gender</button>
        </a>
        <a href="/anal/1-4">
            <button class="choose" alt="stacked_bar/donut">Category purchases by age</button>
        </a>
    </div>
{% endblock %}
