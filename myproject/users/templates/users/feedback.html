{% extends 'layout.html' %}

{% block title %}
    Feedback
{% endblock %}

{% block content %}        
    <div class="row">
        <form class="feedback" action="{% url 'users:feedback' %}" method="post">
            {% csrf_token %}
            <div class="col-md-6">
                <label for="fname" class="form-label">Tell me your feedback:</label>
                <br>
                {{form.feedback}}
            </div>
            <button type="submit" class="choose">Submit</button>
            <ul class="messages">
                {% for message in messages %}
                    <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
                {% endfor %}
            </ul>
        </form>
    </div>
{% endblock %}
