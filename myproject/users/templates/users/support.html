{% extends 'layout.html' %}

{% block title %}
    Feedback
{% endblock %}

{% block content %}        
    <div class="center-content">
        <h1>Support</h1>
        <form action="{% url 'users:support' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="choose">Request Support</button>
        </form>
        <ul class="messages">
            {% for message in messages %}
                <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
