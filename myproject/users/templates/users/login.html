{% extends 'layout.html' %}

{% block title %}
    User Login
{% endblock %}

{% block content %}
    <h1>Hello! Welcome to MarketingDA!</h1>
    <h2 class="form-title">User Login</h2>
    <form class="form-with-validation" action="{% url 'users:login' %}" method="post">
        {% csrf_token %}
        {{ form }}
        {% if request.GET.next %}
            <input type="hidden" name="next" value="{{ request.GET.next }}" />
        {% endif %}
        <button class="form-submit">Submit</button>
    </form>
    <p class="form-title">Don't have an account? <a href="{% url 'users:register' %}">Create account</a></p>
{% endblock %}
